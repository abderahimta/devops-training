name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd ../../project-1-app
          npm install

      - name: Run app (test simple)
        run: |
          cd ../../project-1-app
          node app.js & sleep 5

      - name: Build Docker image
        run: |
          cd ../../project-1-app
          docker build -t devops-app .
